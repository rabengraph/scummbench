<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ScummBench</title>
    <!--
      Local-dev fallback. Vercel redirects "/" -> "/briefing" via
      vercel.json before this file is ever served, but plain
      http-server has no rewrite layer, so we redirect from HTML.
    -->
    <meta http-equiv="refresh" content="0; url=/briefing" />
    <link rel="canonical" href="/briefing" />
  </head>
  <body>
    <p>Redirecting to <a href="/briefing">/briefing</a>&hellip;</p>
  </body>
</html>
